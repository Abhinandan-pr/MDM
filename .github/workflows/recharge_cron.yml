name: 15-Minute Recharge Simulator Engine

# This controls when the action will run
on:
  schedule:
    # This cron syntax means "At every 15th minute"
    - cron: '*/15 * * * *'
  
  # Allows you to trigger it manually from the GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  run-recharge-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy pymysql psycopg2-binary cryptography

      - name: Execute Batch Recharge Script
        # This is where GitHub pulls your Repository Secrets and injects them
        env:
          POSTGRES_API_URL: ${{ secrets.POSTGRES_API_URL }}
          MYSQL_MASTER_URL: ${{ secrets.MYSQL_MASTER_URL }}
        run: |
          python batch_recharge.py
